<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="page">
        <div class="logo">Netflix</div>

        <section class="content">
            <div class="login-card">
                <h1>Entrar</h1>

                <form>
                    <div class="form-group">
                        <input class="form-input" type="text" placeholder="Email ou número de telefone">
                    </div>

                    <div class="form-group">
                        <input class="form-input" type="password" placeholder="Senha">
                    </div>

                    <button class="submit-btn" type="submit">Entrar</button>

                    <div class="options">
                        <label class="remember">
                            <input type="checkbox" checked>
                            <span>Lembre-se de mim</span>
                        </label>

                        <a href="https://i.pinimg.com/474x/2f/c5/42/2fc5429cc937124e13e1b4ff059bc1c5.jpg">Precisa de ajuda?</a>
                    </div>
                </form>

                <div class="support">
                    <div class="facebook-login">
                        <span class="facebook-icon">f</span>
                        <a href="https://stickerly.pstatic.net/sticker_pack/09DNgq69XoEvmn1BXeeFuA/3K6KMT/32/2483443e-e82b-4200-95c5-3d953eab10a8.png">Conectar com Facebook</a>
                    </div>

                    <p class="signup">
                        Novo por aqui? <a href="#"><strong>Assine agora</strong></a>
                    </p>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
